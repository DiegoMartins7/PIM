server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=controle_squad;encrypt=false
    username: sa
    password: suaSenhaAqui
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update   # cria/atualiza tabelas automaticamente
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    show-sql: true       # loga SQL no console (bom pra debug)

  jackson:
    serialization:
      INDENT_OUTPUT: true

jwt:
  secret: "umaChaveSuperSecretaDeNoMinimo32Caracteres"
  expiration: 3600000   # 1 hora em milissegundos